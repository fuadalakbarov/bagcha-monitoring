<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bağçada Qidalanma Monitorinqi</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1F3D33 0%, #2d5a45 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── Header ── */
  .site-header {
    text-align: center;
    color: #FAF6EF;
    margin-bottom: 28px;
    width: 100%;
    max-width: 560px;
  }
  .site-header .region-badge {
    display: inline-block;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50px;
    padding: 6px 20px;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #c8ddd4;
    margin-bottom: 10px;
  }
  .site-header h2 {
    font-size: clamp(1.1rem, 4vw, 1.55rem);
    font-weight: 700;
    line-height: 1.35;
    color: #ffffff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .site-header .divider {
    width: 50px;
    height: 3px;
    background: #5ec98a;
    border-radius: 4px;
    margin: 12px auto 0;
  }

  /* ── Card ── */
  .card {
    background: #FAF6EF;
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  .logo { font-size: 3rem; margin-bottom: 14px; }
  h1 {
    color: #1F3D33;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    margin-bottom: 10px;
    line-height: 1.35;
  }
  p {
    color: #5c6b62;
    margin-bottom: 32px;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .btn {
    display: block;
    padding: 14px 28px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 12px;
    transition: 0.2s;
  }
  .btn-primary { background: #1F3D33; color: #FAF6EF; }
  .btn-primary:hover { background: #2d5a45; }
  .btn-outline { background: transparent; border: 2px solid #1F3D33; color: #1F3D33; }
  .btn-outline:hover { background: #e8f0ec; }

  /* ── Footer ── */
  .site-footer {
    margin-top: 28px;
    text-align: center;
    color: rgba(255,255,255,0.45);
    font-size: 0.78rem;
    line-height: 1.7;
  }
  .site-footer strong { color: rgba(255,255,255,0.65); font-weight: 500; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .card { padding: 32px 24px; }
    .site-header h2 { font-size: 1.05rem; }
  }
</style>
</head>
<body>

  <!-- Başlıq -->
  <header class="site-header">
    <div class="region-badge">Rəsmi Portal</div>
    <h2>Gəncə-Daşkəsən Regional<br>Təhsil İdarəsi</h2>
    <div class="divider"></div>
  </header>

  <!-- Kart -->
  <div class="card">
    <div class="logo">🌿</div>
    <h1>Bağçada Qidalanma<br>Monitorinq Sistemi</h1>
    <p>Uşaq bağçalarında qidalanma keyfiyyətini<br>izləmək üçün rəqəmsal platforma</p>
    <a href="/survey" class="btn btn-primary">📋 Sorğu Doldur</a>
    <a href="/admin" class="btn btn-outline">🔐 Admin Paneli</a>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>© 2026 Gəncə-Daşkəsən Regional Təhsil İdarəsi</p>
    <p>All rights reserved. by <strong>F.Alakbarov</strong></p>
  </footer>

</body>
</html>
